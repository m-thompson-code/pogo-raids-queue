@let authState = user$ | async;

@if (authState === undefined) {
  <!-- resolving auth state -->
} @else if (authState) {
  <nav class="app-nav">
    <a routerLink="/" routerLinkActive="app-nav__link--active" [routerLinkActiveOptions]="{exact: true}" class="app-nav__link">Queue</a>
    <a routerLink="/users" routerLinkActive="app-nav__link--active" class="app-nav__link">Users</a>
  </nav>
  <router-outlet />
  <app-settings />
  <img class="regirice-btn" src="/regirice.png" alt="Regirice" (click)="spawnRegirice()" />
  @for (sprite of regirice(); track sprite.id) {
    <img class="regirice-sprite" src="regirice.png" alt="Regirice" [style]="sprite.style" />
  }
} @else {
  <app-login />
}
